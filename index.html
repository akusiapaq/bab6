<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcard Kosakata Bab 6</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="card">
            <div class="header">
                <span id="counter">1 / 100</span>
                <button id="shuffleBtn" onclick="shuffleData()">Acak List</button>
            </div>
            
            <div class="content">
                <h1 id="hangeul">하루</h1>
                <p id="ejaan">Ha-ru</p>
                <div class="divider"></div>
                <h2 id="arti">hari / sehari / satu hari</h2>
            </div>

            <div class="navigation">
                <button id="prevBtn" onclick="prevCard()">← Sebelumnya</button>
                <button id="nextBtn" onclick="nextCard()">Selanjutnya →</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
